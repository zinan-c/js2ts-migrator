<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>js2ts-migrator - One Page Helper</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #151a22;
        --accent: #4fd1c5;
        --text: #e6edf3;
        --muted: #9aa4b2;
        --border: #2b3342;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, #1d2735 0%, var(--bg) 50%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .container {
        width: min(960px, 100%);
        background: linear-gradient(180deg, #151a22, #10141b);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 16px 0;
        color: var(--muted);
      }
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 14px;
        padding: 24px;
        text-align: center;
        background: #0f141b;
        transition: border-color 0.2s, background 0.2s;
        cursor: pointer;
      }
      .dropzone.dragover {
        border-color: var(--accent);
        background: #0b1a1a;
      }
      .dropzone input {
        display: none;
      }
      .output {
        margin-top: 20px;
      }
      textarea {
        width: 100%;
        min-height: 320px;
        background: #0b0f14;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      button {
        background: var(--accent);
        color: #0b0f14;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        margin-left: 8px;
        font-size: 11px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>js2ts-migrator <span class="badge">One Page Helper</span></h1>
      <p>Drop a `.js`, `.jsx`, `.mjs`, or `.cjs` file to preview a TypeScript migration and download the result.</p>

      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".js,.jsx,.mjs,.cjs" />
        <strong>Drop file here</strong> or click to select
      </label>

      <div class="output">
        <textarea id="output" placeholder="Migrated TypeScript will appear here..." readonly></textarea>
        <div class="actions">
          <button id="downloadBtn" disabled>Download .ts</button>
          <button id="clearBtn" disabled>Clear</button>
        </div>
        <div class="meta" id="meta"></div>
      </div>
    </div>

    <script>
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("fileInput");
      const output = document.getElementById("output");
      const downloadBtn = document.getElementById("downloadBtn");
      const clearBtn = document.getElementById("clearBtn");
      const meta = document.getElementById("meta");

      let currentFileName = "output.ts";
      let currentContent = "";

      function setButtonsEnabled(enabled) {
        downloadBtn.disabled = !enabled;
        clearBtn.disabled = !enabled;
      }

      async function handleFile(file) {
        const formData = new FormData();
        formData.append("file", file, file.name);

        output.value = "Migrating...";
        meta.textContent = "";
        setButtonsEnabled(false);

        try {
          const res = await fetch("/api/migrate", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "Failed to migrate file");
          }
          currentContent = data.content || "";
          output.value = currentContent;
          currentFileName = data.output_name || "output.ts";
          meta.textContent = `Vars: ${data.var_count} | Lines: ${data.line_count} | Output: ${currentFileName}`;
          setButtonsEnabled(true);
        } catch (err) {
          output.value = "";
          meta.textContent = `Error: ${err.message || err}`;
        }
      }

      dropzone.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) handleFile(file);
      });

      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("dragover");
      });
      dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) handleFile(file);
      });

      downloadBtn.addEventListener("click", () => {
        const blob = new Blob([currentContent], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = currentFileName || "output.ts";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      clearBtn.addEventListener("click", () => {
        output.value = "";
        meta.textContent = "";
        currentContent = "";
        currentFileName = "output.ts";
        fileInput.value = "";
        setButtonsEnabled(false);
      });
    </script>
  </body>
</html>

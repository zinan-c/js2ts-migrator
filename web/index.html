<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>js2ts-migrator - One Page Helper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>js2ts-migrator <span class="badge">One Page Helper</span></h1>
      <p>Drop a `.js`, `.jsx`, `.mjs`, or `.cjs` file to preview a TypeScript migration and download the result.</p>

      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".js,.jsx,.mjs,.cjs" />
        <strong>Drop file here</strong> or click to select
      </label>

      <div class="output">
        <textarea id="output" placeholder="Migrated TypeScript will appear here..." readonly></textarea>
        <div class="actions">
          <button id="downloadBtn" disabled>Download .ts</button>
          <button id="clearBtn" disabled>Clear</button>
        </div>
        <div class="meta" id="meta"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
